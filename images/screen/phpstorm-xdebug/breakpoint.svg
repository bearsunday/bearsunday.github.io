<rect x="66" y="158" width="1148" height="520" rx="14" fill="#f9fafb" stroke="#cbd5e1" stroke-width="2"/><rect x="94" y="190" width="720" height="360" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/><text x="118" y="225" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="22" font-weight="700" fill="#1f2937">bin/page.php</text><text x="150" y="265" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 1  &lt;?php</text><text x="150" y="299" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 2  </text><text x="150" y="333" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 3  declare(strict_types=1);</text><text x="150" y="367" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 4  </text><text x="150" y="401" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 5  use MyVendor\MyProject\Bootstrap;</text><text x="150" y="435" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 6  </text><text x="150" y="469" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 7  require dirname(__DIR__) . &#x27;/autoload.php&#x27;;</text><rect x="110" y="470" width="680" height="34" rx="6" fill="#dbeafe"/><circle cx="126" cy="488" r="9" fill="#ef4444"/><text x="150" y="503" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="400" fill="#111827"> 8  exit((new Bootstrap())(&#x27;cli-hal-app&#x27;, $GLOBALS, $_SERVER));</text><rect x="842" y="190" width="330" height="360" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="2"/><text x="866" y="225" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="22" font-weight="700" fill="#1f2937">Debug</text><text x="866" y="270" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="19" font-weight="700" fill="#374151">Frames</text><rect x="866" y="294" width="250" height="44" rx="16" fill="#eef2ff" stroke="#818cf8" stroke-width="2"/><text x="884" y="325" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="20" font-weight="600" fill="#3730a3">page.php:8</text><text x="866" y="380" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="19" font-weight="700" fill="#374151">Variables</text><text x="886" y="420" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="18" font-weight="400" fill="#1f2937">$_ENV</text><text x="886" y="454" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="18" font-weight="400" fill="#1f2937">$_SERVER</text><text x="866" y="512" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="18" font-weight="700" fill="#166534">Connected to Xdebug</text><text x="94" y="660" font-family="-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif" font-size="20" font-weight="500" fill="#4b5563">A successful setup stops at the breakpoint without a connection error balloon.</text>
