<!-- Replaces the root index.html of bearsunday.github.io. -->
<!-- [Learn] -> the Learn site (/learn/), [Manual] -> the manual (/manuals/). -->
<div class="jumbotron">
    <img src="./images/BEAR-logo.png">
    <p>
        BEAR.Sunday is a resource orientated framework with a <strong>REST</strong> centered architecture, implementing <strong>Dependency Injection</strong> and <strong>Aspect Orientated</strong> Programming' at its core.
    </p>
    <a class="btn btn-primary" id="learn" href="/learn/">
        Learn &raquo;
    </a>
    <a class="btn btn-secondary" id="manual" data-auto-locale-link="manual" href="/manuals/1.0/en/index.html">
        Manual
    </a>
    <script>
        // Keep the manual link locale-aware (switch /en/ -> /ja/ for Japanese browsers).
        window.addEventListener('DOMContentLoaded', () => {
            const navigatorLanguages = window.navigator.languages;
            const locales = (navigatorLanguages && navigatorLanguages.length)
                ? navigatorLanguages
                : [window.navigator.language ?? ''];
            const prefersJapanese = locales.some((locale) => locale.toLowerCase().startsWith('ja'));

            if (!prefersJapanese) {
                return;
            }

            const links = document.querySelectorAll('[data-auto-locale-link="manual"]');
            for (const link of links) {
                const href = link.getAttribute('href');
                if (href && href.includes('/en/')) {
                    link.setAttribute('href', href.replace('/en/', '/ja/'));
                }
            }
        });
    </script>
</div>
